<style>
  #terminal-quest-widget {
    --tq-bg: #0d1117;
    --tq-bg-panel: #161b22;
    --tq-text: #c9d1d9;
    --tq-prompt: #3fb950;
    --tq-border: #30363d;
    --tq-dim: #484f58;
    --tq-accent: #3b82f6;
    --tq-glow: rgba(59, 130, 246, 0.15);
    
    font-family: 'Fira Code', 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    max-width: 960px;
    margin: 0 auto;
    padding: 16px;
    box-sizing: border-box;
    line-height: 1.5;
  }
  
  #terminal-quest-widget * { box-sizing: border-box; }
  
  .tq-container {
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
    background: var(--tq-bg);
    position: relative;
    margin: 8px 0;
  }
  
  .tq-container::before {
    content: '';
    position: absolute;
    top: -50%;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 50%;
    background: radial-gradient(ellipse, var(--tq-glow) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  
  .tq-topbar {
    background: linear-gradient(180deg, rgba(22, 27, 34, 0.95) 0%, var(--tq-bg-panel) 100%);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    border-bottom: 1px solid var(--tq-border);
    position: relative;
    z-index: 1;
  }
  
  .tq-window-controls { display: flex; gap: 8px; margin-right: 16px; }
  .tq-window-btn { width: 12px; height: 12px; border-radius: 50%; transition: all 0.2s ease; cursor: pointer; }
  .tq-window-btn.close { background: #ff5f57; }
  .tq-window-btn.minimize { background: #febc2e; }
  .tq-window-btn.maximize { background: #28c840; }
  
  .tq-level-badge {
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
    color: #60a5fa;
    border: 1px solid rgba(59, 130, 246, 0.3);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .tq-mission {
    font-size: 13px;
    font-weight: 500;
    color: var(--tq-text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 150px;
  }
  
  .tq-progress-wrap { width: 100px; height: 4px; border-radius: 4px; background: rgba(255, 255, 255, 0.1); overflow: hidden; }
  .tq-progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--tq-accent) 0%, #8b5cf6 100%); transition: width 0.5s ease; }
  
  .tq-sound-btn {
    width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--tq-border);
    background: rgba(255, 255, 255, 0.05); color: var(--tq-prompt); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
    transition: all 0.2s ease; flex-shrink: 0;
  }
  .tq-sound-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }
  
  .tq-terminal {
    background: var(--tq-bg);
    min-height: 450px; max-height: 500px;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  
  .tq-crt {
    position: absolute; inset: 0; pointer-events: none; z-index: 2;
    background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 2px);
  }
  
  .tq-terminal::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.3) 100%);
  }
  
  .tq-output {
    flex: 1; padding: 20px; overflow-y: auto;
    font-size: 13px; line-height: 1.6;
    white-space: pre-wrap; word-break: break-word;
    position: relative; z-index: 1;
    color: var(--tq-text);
    scrollbar-width: thin; scrollbar-color: var(--tq-border) transparent;
  }
  .tq-output::-webkit-scrollbar { width: 6px; }
  .tq-output::-webkit-scrollbar-track { background: transparent; }
  .tq-output::-webkit-scrollbar-thumb { background: var(--tq-border); border-radius: 3px; }
  
  .tq-input-row {
    display: flex; align-items: center; padding: 12px 20px;
    border-top: 1px solid var(--tq-border);
    background: rgba(22, 27, 34, 0.5);
    position: relative; z-index: 1;
  }
  
  .tq-prompt {
    color: var(--tq-prompt); font-weight: 700; margin-right: 10px; font-size: 13px;
    text-shadow: 0 0 10px var(--tq-prompt);
  }
  
  .tq-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: inherit; font-size: 13px;
    color: var(--tq-text); caret-color: var(--tq-prompt);
  }
  .tq-input::placeholder { color: var(--tq-dim); }
  
  /* Autocomplete dropdown */
  .tq-autocomplete {
    position: absolute; bottom: 100%; left: 0; right: 0;
    background: var(--tq-bg-panel); border: 1px solid var(--tq-border);
    border-radius: 8px 8px 0 0; padding: 6px 8px; margin-bottom: -1px;
    display: none; z-index: 10;
    max-height: 200px; overflow-y: auto;
  }
  
  .tq-autocomplete-item {
    padding: 6px 10px; border-radius: 6px; cursor: pointer;
    font-size: 12px; color: var(--tq-text);
    transition: background 0.1s ease;
    display: flex; align-items: center; gap: 8px;
  }
  
  .tq-autocomplete-item:hover { background: rgba(255, 255, 255, 0.05); }
  .tq-autocomplete-item.selected { background: rgba(59, 130, 246, 0.2); color: #fff; }
  .tq-autocomplete-item .match { color: var(--tq-accent); font-weight: 600; }
  .tq-autocomplete-item .desc { color: var(--tq-dim); font-size: 10px; margin-left: auto; }
  .tq-autocomplete-item.selected .desc { color: rgba(255, 255, 255, 0.6); }
  .tq-autocomplete-more { padding: 4px 10px; font-size: 10px; color: var(--tq-dim); text-align: center; }
  
  .tq-music-bar {
    margin-top: 10px; padding: 12px 16px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(30, 40, 55, 0.9) 0%, rgba(20, 28, 40, 0.9) 100%);
    border: 1px solid rgba(100, 120, 150, 0.15);
    display: none; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }
  .tq-music-inner { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .tq-track-info { flex: 1; min-width: 0; }
  .tq-track-name { font-size: 13px; font-weight: 600; color: #a8d8ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tq-track-artist { font-size: 11px; color: #6b8299; margin-top: 2px; }
  .tq-variation { font-size: 10px; color: #8b5cf6; background: rgba(139, 92, 246, 0.15); padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
  .tq-player-btns { display: flex; gap: 6px; }
  .tq-player-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid rgba(100, 120, 150, 0.25);
    background: rgba(255, 255, 255, 0.05); color: #a8d8ff;
    cursor: pointer; font-size: 12px; transition: all 0.2s ease;
  }
  .tq-player-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }
  
  .tq-hint {
    margin-top: 8px; padding: 8px 14px; border-radius: 8px; font-size: 12px; display: none;
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(217, 119, 6, 0.1) 100%);
    color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2);
  }
  
  .tq-snake-controls { display: none; margin-top: 12px; }
  .tq-snake-grid { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(2, 50px); gap: 6px; justify-content: center; }
  .tq-snake-btn {
    width: 50px; height: 50px; border-radius: 12px; border: 1px solid var(--tq-border);
    background: rgba(255, 255, 255, 0.07); color: var(--tq-text);
    cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .tq-snake-btn:hover { background: rgba(255, 255, 255, 0.12); transform: scale(0.95); }
  .tq-snake-quit {
    margin-top: 10px; padding: 8px 20px; border-radius: 8px;
    border: 1px solid #f85149; color: #f85149; background: transparent;
    cursor: pointer; font-family: inherit; font-size: 12px;
  }
  .tq-snake-quit:hover { background: rgba(248, 81, 73, 0.1); }
  
  /* ============ 13 THEMES ============ */
  .tq-theme-default { --tq-bg: #0d1117; --tq-bg-panel: #161b22; --tq-text: #c9d1d9; --tq-prompt: #3fb950; --tq-border: #30363d; --tq-dim: #484f58; --tq-accent: #3b82f6; --tq-glow: rgba(59, 130, 246, 0.15); }
  .tq-theme-matrix { --tq-bg: #000; --tq-bg-panel: #001100; --tq-text: #00ff41; --tq-prompt: #00ff41; --tq-border: #003300; --tq-dim: #005500; --tq-accent: #00ff41; --tq-glow: rgba(0, 255, 65, 0.2); }
  .tq-theme-amber { --tq-bg: #1a1004; --tq-bg-panel: #120b00; --tq-text: #ffb000; --tq-prompt: #ff8c00; --tq-border: #4d3300; --tq-dim: #805300; --tq-accent: #ff8c00; --tq-glow: rgba(255, 176, 0, 0.15); }
  .tq-theme-light { --tq-bg: #f6f8fa; --tq-bg-panel: #ffffff; --tq-text: #1f2937; --tq-prompt: #059669; --tq-border: #d0d7de; --tq-dim: #9ca3af; --tq-accent: #3b82f6; --tq-glow: rgba(59, 130, 246, 0.1); }
  .tq-theme-ocean { --tq-bg: #0a192f; --tq-bg-panel: #112240; --tq-text: #ccd6f6; --tq-prompt: #64ffda; --tq-border: #1e3a5f; --tq-dim: #8892b0; --tq-accent: #64ffda; --tq-glow: rgba(100, 255, 218, 0.15); }
  .tq-theme-sunset { --tq-bg: #1a0a0a; --tq-bg-panel: #2d1515; --tq-text: #ffcccb; --tq-prompt: #ff6b6b; --tq-border: #4a2020; --tq-dim: #8b5a5a; --tq-accent: #ff8c42; --tq-glow: rgba(255, 107, 107, 0.15); }
  .tq-theme-forest { --tq-bg: #0d1a0d; --tq-bg-panel: #152415; --tq-text: #90ee90; --tq-prompt: #32cd32; --tq-border: #2d4a2d; --tq-dim: #4a7c4a; --tq-accent: #98fb98; --tq-glow: rgba(50, 205, 50, 0.15); }
  .tq-theme-purple { --tq-bg: #1a1025; --tq-bg-panel: #2d1b3d; --tq-text: #e0b0ff; --tq-prompt: #bf7fff; --tq-border: #4a2d5c; --tq-dim: #8b5a8b; --tq-accent: #9370db; --tq-glow: rgba(147, 112, 219, 0.15); }
  .tq-theme-dracula { --tq-bg: #282a36; --tq-bg-panel: #21222c; --tq-text: #f8f8f2; --tq-prompt: #50fa7b; --tq-border: #44475a; --tq-dim: #6272a4; --tq-accent: #bd93f9; --tq-glow: rgba(189, 147, 249, 0.15); }
  .tq-theme-nord { --tq-bg: #2e3440; --tq-bg-panel: #3b4252; --tq-text: #eceff4; --tq-prompt: #a3be8c; --tq-border: #4c566a; --tq-dim: #7b88a1; --tq-accent: #88c0d0; --tq-glow: rgba(136, 192, 208, 0.15); }
  .tq-theme-hacker { --tq-bg: #000; --tq-bg-panel: #0a0a0a; --tq-text: #0f0; --tq-prompt: #0f0; --tq-border: #030; --tq-dim: #090; --tq-accent: #0f0; --tq-glow: rgba(0, 255, 0, 0.25); }
  .tq-theme-gruvbox { --tq-bg: #282828; --tq-bg-panel: #3c3836; --tq-text: #ebdbb2; --tq-prompt: #b8bb26; --tq-border: #504945; --tq-dim: #928374; --tq-accent: #fe8019; --tq-glow: rgba(254, 128, 25, 0.15); }
  .tq-theme-monokai { --tq-bg: #272822; --tq-bg-panel: #1e1f1c; --tq-text: #f8f8f2; --tq-prompt: #a6e22e; --tq-border: #3e3d32; --tq-dim: #75715e; --tq-accent: #66d9ef; --tq-glow: rgba(102, 217, 239, 0.15); }
  
  @media (max-width: 600px) {
    #terminal-quest-widget { padding: 10px; }
    .tq-topbar { padding: 10px 14px; }

    .tq-terminal { min-height: 380px; max-height: 420px; }
  }
</style>

<script>
(function() {
'use strict';

// ============================================================
// CONFIG
// ============================================================
const SETTINGS_KEY = 'tq_settings_v1';
const PROFILE_KEY  = 'tq_profile_v1';
const FS_KEY       = 'tq_fs_v1';
const SAVE_KEY     = 'tq_save_v1';

const defaultSettings = { theme: 'default', music: 'cyber' };
const defaultProfile  = { firstName: 'User', lastName: '', age: '', email: '', bio: 'Новичок.' };

let settings    = safeLoad(SETTINGS_KEY, defaultSettings);
let userProfile = safeLoad(PROFILE_KEY,  defaultProfile);
let FS          = safeLoad(FS_KEY, buildDefaultFS());
let currentLevel = parseInt(localStorage.getItem(SAVE_KEY) || '0');
let currentPath  = '/user';
let cmdHistory   = [];
let histIdx      = -1;
let isSandbox    = false;
let isEditMode   = false;
let editStep     = 0;
let snakeActive  = false;
let snakeTimer   = null;

function safeLoad(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } }
function safeSave(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function buildDefaultFS() {
  return {
    '/':                    { type:'dir',  children:['training','docs','logs','system','user','etc'] },
    '/training':            { type:'dir',  children:['readme.txt'] },
    '/training/readme.txt': { type:'file', content:'Welcome to Terminal Quest.\nLearn Linux commands step by step.' },
    '/docs':                { type:'dir',  children:['manual.txt','.secret'] },
    '/docs/.secret':        { type:'file', content:'KEY: 4815162342' },
    '/docs/manual.txt':     { type:'file', content:'Manual v1.0 — use "help" for commands.' },
    '/logs':                { type:'dir',  children:['error.log','temp.tmp'] },
    '/logs/error.log':      { type:'file', content:'[ERROR] Process guard:404 active.' },
    '/logs/temp.tmp':       { type:'file', content:'tmp data' },
    '/system':              { type:'dir',  children:['diagnose.sh','temp.tmp','data.db','exploit.py'] },
    '/system/diagnose.sh':  { type:'file', content:'#!/bin/bash\necho "System OK"' },
    '/system/temp.tmp':     { type:'file', content:'tmp' },
    '/system/data.db':      { type:'file', content:'DB: 1024 records.' },
    '/system/exploit.py':   { type:'file', content:'# exploit v0.1' },
    '/user':                { type:'dir',  children:[] },
    '/etc':                 { type:'dir',  children:['shadow'] },
    '/etc/shadow':          { type:'file', content:'root:x:0:0:root' }
  };
}

// ============================================================
// LEVELS
// ============================================================
const LEVELS = [
  { lvl:1,  text:"Узнайте текущую директорию → pwd",           cmd:"pwd" },
  { lvl:2,  text:"Список файлов → ls",                          cmd:"ls" },
  { lvl:3,  text:"Перейдите в 'training' → cd training",        cmd:"cd training" },
  { lvl:4,  text:"Прочитайте 'readme.txt' → cat readme.txt",    cmd:"cat readme.txt" },
  { lvl:5,  text:"Вернитесь на уровень выше → cd ..",           cmd:"cd .." },
  { lvl:6,  text:"Найдите скрытые файлы → ls -a",               cmd:"ls -a" },
  { lvl:7,  text:"Перейдите в 'logs' → cd logs",                cmd:"cd logs" },
  { lvl:8,  text:"Прочитайте лог → cat error.log",              cmd:"cat error.log" },
  { lvl:9,  text:"Перейдите в 'system' → cd ../system",         cmd:"cd ../system" },
  { lvl:10, text:"Создайте файл → touch checkpoint.txt",        cmd:"touch checkpoint.txt" },
  { lvl:11, text:"Запустите скрипт → ./diagnose.sh",            cmd:"./diagnose.sh" },
  { lvl:12, text:"Удалите temp.tmp → rm temp.tmp",              cmd:"rm temp.tmp" },
  { lvl:13, text:"Создайте папку → mkdir backup",               cmd:"mkdir backup" },
  { lvl:14, text:"Переместите файл → mv data.db backup/",       cmd:"mv data.db backup/" },
  { lvl:15, text:"Проверьте сеть → ping server",                cmd:"ping server" },
  { lvl:16, text:"Список процессов → ps",                       cmd:"ps" },
  { lvl:17, text:"Остановите процесс → kill 404",               cmd:"kill 404" },
  { lvl:18, text:"Права доступа → chmod +x exploit.py",         cmd:"chmod +x exploit.py" },
  { lvl:19, text:"SSH подключение → ssh admin@vault",           cmd:"ssh admin@vault" },

// ============================================================
let autocompleteItems = [];
let autocompleteIndex = 0;
let autocompleteVisible = false;
let lastInputValue = '';

function getCompletions(input) {
  const parts = input.split(' ');
  const lastPart = parts[parts.length - 1];
  const prevPart = parts.length > 1 ? parts[parts.length - 2] : '';
  
  // music command
  if (parts[0] === 'music' && parts.length <= 3) {
    if (parts.length === 1) {
      return Object.keys(MUSIC_TRACKS).map(k => ({ value: k, desc: MUSIC_TRACKS[k].name }));
    }
    if (parts.length === 2) {
      return Object.keys(MUSIC_TRACKS)
        .filter(k => k.startsWith(lastPart))
        .map(k => ({ value: k, desc: MUSIC_TRACKS[k].name }));
    }
    if (parts.length === 3) {
      const cat = prevPart;
      const matches = Object.keys(MUSIC_TRACKS)
        .filter(k => k.startsWith(cat + '_') && k.split('_')[1]?.startsWith(lastPart));
      return matches.map(k => ({ value: k.split('_')[1], desc: MUSIC_TRACKS[k].name }));
    }
  }
  
  // theme command
  if (parts[0] === 'theme' && parts.length === 2) {
    return THEMES.filter(t => t.startsWith(lastPart)).map(t => ({ value: t, desc: '' }));
  }
  
  // cd command - directories
  if (parts[0] === 'cd' && parts.length === 2) {
    const node = FS[currentPath];
    if (node && node.type === 'dir') {
      const dirs = node.children.filter(f => 
        FS[currentPath === '/' ? `/${f}` : `${currentPath}/${f}`]?.type === 'dir'
      );
      return dirs.filter(d => d.startsWith(lastPart)).map(d => ({ value: d, desc: '📁' }));
    }
  }
  
  // cat, rm, touch - files
  if (['cat', 'rm', 'touch'].includes(parts[0]) && parts.length === 2) {
    const node = FS[currentPath];
    if (node && node.type === 'dir') {
      return node.children.filter(f => f.startsWith(lastPart)).map(f => {
        const fp = currentPath === '/' ? `/${f}` : `${currentPath}/${f}`;
        const isDir = FS[fp]?.type === 'dir';
        return { value: f, desc: isDir ? '📁' : '📄' };
      });
    }
  }
  
  // First word - commands
  if (parts.length === 1) {
    return COMMANDS.filter(c => c.startsWith(input)).map(c => ({ value: c, desc: '' }));
  }
  
  return [];
}

function showAutocomplete(items) {
  if (!items || items.length === 0) { hideAutocomplete(); return; }
  autocompleteItems = items;
  autocompleteIndex = 0;
  renderAutocomplete();
}

function renderAutocomplete() {
  if (!autocompleteItems.length) return;
  
  const parts = inputEl.value.split(' ');
  const lastPart = parts[parts.length - 1];
  
  let html = '';
  const maxShow = 7;
  const itemsToShow = autocompleteItems.slice(0, maxShow);
  
  itemsToShow.forEach((item, i) => {
    let display = item.value;
    if (display.includes('_')) display = display.split('_')[1];
    
    const matchLen = lastPart.length;
    const matched = display.substring(0, Math.min(matchLen, display.length));
    const rest = display.substring(matchLen);
    const selected = i === autocompleteIndex;
    
    html += `<div class="tq-autocomplete-item ${selected ? 'selected' : ''}" data-idx="${i}" data-val="${item.value}">
      <span class="match">${matched}</span>${rest}
      ${item.desc ? `<span class="desc">${item.desc}</span>` : ''}
    </div>`;
  });
  
  if (autocompleteItems.length > maxShow) {
    html += `<div class="tq-autocomplete-more">↓ Ещё ${autocompleteItems.length - maxShow} вариантов</div>`;
  }
  
  autocompleteEl.innerHTML = html;
  autocompleteEl.style.display = 'block';
  autocompleteVisible = true;
}

function hideAutocomplete() {
  autocompleteEl.style.display = 'none';
  autocompleteVisible = false;
  autocompleteItems = [];
  autocompleteIndex = 0;
}

function navigateAutocomplete(direction) {
  if (!autocompleteVisible || autocompleteItems.length === 0) return;
  if (direction === 'down') autocompleteIndex = (autocompleteIndex + 1) % autocompleteItems.length;
  else autocompleteIndex = (autocompleteIndex - 1 + autocompleteItems.length) % autocompleteItems.length;
  renderAutocomplete();
}

function selectCurrentItem() {
  if (!autocompleteVisible || autocompleteItems.length === 0) return false;
  const item = autocompleteItems[autocompleteIndex];
  if (item) { applyCompletion(item.value); return true; }
  return false;
}

function applyCompletion(item) {
  const parts = inputEl.value.split(' ');
  parts[parts.length - 1] = item;
  inputEl.value = parts.join(' ') + ' ';
  hideAutocomplete();
  sfx('type');
  lastInputValue = inputEl.value;
}

autocompleteEl.addEventListener('click', (e) => {
  const item = e.target.closest('.tq-autocomplete-item');
  if (item && item.dataset.val) {
    autocompleteIndex = parseInt(item.dataset.idx) || 0;
    applyCompletion(item.dataset.val);
  }
});

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(audioCtx.destination);
  } catch(e) {}
}

function playNote(freq, type, dur, vol = 0.1, delay = 0) {
  if (!audioCtx || isMuted || !freq) return;
  const t = audioCtx.currentTime + delay;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + dur);
}

function kick(d = 0, v = 0.35) {
  if (!audioCtx || isMuted) return;
  const t = audioCtx.currentTime + d;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(40, t + 0.1);
  g.gain.setValueAtTime(v, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + 0.3);
}

function snare(d = 0, v = 0.12) {
  if (!audioCtx || isMuted) return;
  const t = audioCtx.currentTime + d;
  const bufferSize = audioCtx.sampleRate * 0.1;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  noise.buffer = buffer;
  filter.type = 'highpass'; filter.frequency.value = 1000;
  g.gain.setValueAtTime(v, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  noise.connect(filter); filter.connect(g); g.connect(masterGain);
  noise.start(t); noise.stop(t + 0.1);
}

function hihat(d = 0, open = false, v = 0.06) {
  if (!audioCtx || isMuted) return;
  const t = audioCtx.currentTime + d;
  const dur = open ? 0.15 : 0.05;
  const bufferSize = audioCtx.sampleRate * dur;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  noise.buffer = buffer;
  filter.type = 'highpass'; filter.frequency.value = 7000;
  g.gain.setValueAtTime(v, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  noise.connect(filter); filter.connect(g); g.connect(masterGain);
  noise.start(t); noise.stop(t + dur);
}

function clap(d = 0, v = 0.1) {
  if (!audioCtx || isMuted) return;
  const t = audioCtx.currentTime + d;
  for (let i = 0; i < 3; i++) {
    const bufferSize = audioCtx.sampleRate * 0.02;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let j = 0; j < bufferSize; j++) data[j] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    noise.buffer = buffer;
    filter.type = 'bandpass'; filter.frequency.value = 2500;
    g.gain.setValueAtTime(v, t + i * 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.05 + i * 0.01);
    noise.connect(filter); filter.connect(g); g.connect(masterGain);
    noise.start(t + i * 0.01); noise.stop(t + 0.1);
  }
}

function chord(notes, type, dur, v = 0.05, spread = 0.02) {
  notes.forEach((n, i) => playNote(n, type, dur, v, i * spread));
}

function bass808(freq, dur = 0.5, v = 0.25) {
  if (!audioCtx || isMuted || !freq) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.value = freq;
  g.gain.setValueAtTime(v, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + dur);
}

      if (B % 8 === 0) bass808(bass808notes[Math.floor(B/8) % 4], 0.7, 0.28);
      for (let i = 0; i < (V >= 2 ? 3 : 2); i++) { if (Math.random() > 0.3) hihat(i * 0.04, Math.random() > 0.6, 0.03); }
      if (B % 8 === 0 || B % 8 === 4) kick();
      if (B % 8 === 2 || B % 8 === 6) snare(0, 0.08);
      if (V >= 2 && B % 4 === 0) { const melody = [N.C5, N.Ds5, N.G5, N.C6, N.G5, N.Ds5, N.C5, N.G4]; playNote(melody[Math.floor(B/4) % 8], 'sine', 0.2, 0.03); }
      if (V >= 3 && B % 16 === 0) chord([N.C4, N.Ds4, N.G4], 'sine', 2, 0.02, 0.05);
    }
  },
  
  '8bit': {
    name: '8-Bit Adventure',
    desc: 'Классический игровой звук',
    category: 'main',
    bpm: 120,
    play: function() {
      const B = beat, V = variation;
      const melody = [N.E5, N.E5, 0, N.E5, 0, N.C5, N.E5, 0, N.G5, 0, 0, 0, N.G4, 0, 0, 0];
      if (melody[B % 16]) playNote(melody[B % 16], 'square', 0.12, 0.1);
      const bass = [N.C3, 0, N.G3, 0, N.A3, 0, N.G3, 0];
      if (bass[B % 8]) playNote(bass[B % 8], 'triangle', 0.15, 0.1);
      if (B % 4 === 0) kick();
      if (V >= 2 && B % 4 === 2) snare(0, 0.06);
    }
  },
  
  'nes': {
    name: 'NES Classic',
    desc: 'Звуки Nintendo',
    category: 'main',
    bpm: 125,
    play: function() {
      const B = beat, V = variation;
      const arp = [N.C5, N.E5, N.G5, N.C6, N.G5, N.E5, N.C5, N.G4];
      if (B % 2 === 0) playNote(arp[B % 8], 'square', 0.1, 0.08);
      const bass = [N.C3, N.E3, N.G3, N.C4, N.G3, N.E3, N.C3, N.G2];
      if (B % 4 === 0) playNote(bass[Math.floor(B/4) % 8], 'triangle', 0.2, 0.1);
      if (B % 8 === 0) playNote(N.C5, 'square', 0.02, 0.04);
      if (B % 8 === 4) playNote(N.E5, 'square', 0.02, 0.03);
      if (V >= 2 && B % 4 === 2) { const counter = [N.E5, N.G5, N.C6, N.E6]; playNote(counter[Math.floor(B/4) % 4], 'square', 0.08, 0.04); }
    }
  },
  
  'space': {
    name: 'Space Ambient',
    desc: 'Космические текстуры',
    category: 'main',
    bpm: 45,
    play: function() {
      const B = beat, V = variation;
      if (B % 128 === 0) { playNote(N.C2, 'sine', 16, 0.08); playNote(N.G2, 'sine', 16, 0.05); }
      if (B % 64 === 32 && V >= 2) { playNote(N.E3, 'sine', 8, 0.03); }
      if (Math.random() > 0.95) { const freq = 150 + Math.random() * 600; playNote(freq, 'sine', 3 + Math.random() * 3, 0.006); }
      if (V >= 3 && Math.random() > 0.97) playNote(N.C4 + Math.random() * 100, 'triangle', 2, 0.01);
    }
  }
};

// ============================================================
// MUSIC PLAYBACK
// ============================================================
function playTrack(trackKey) {
  const track = MUSIC_TRACKS[trackKey];
  if (!track) return;
  
  initAudio();
  stopMusic();
  
  currentTrack = trackKey;
  beat = 0;
  section = 0;
  variation = 1;
  
  musicBar.style.display = 'block';
  trackName.textContent = track.name;
  variationBadge.textContent = 'Var 1';
  playPauseBtn.textContent = '⏸';
  
  const bpm = track.bpm || 100;
  const msPerBeat = 60000 / bpm;
  
  musicInterval = setInterval(() => {
    if (!isMuted) track.play();
    beat++;
    if (beat % 64 === 0) {
      variation++;
      if (variation > 4) variation = 1;
      variationBadge.textContent = `Var ${variation}`;
    }
  }, msPerBeat);
  
  settings.music = trackKey;
  safeSave(SETTINGS_KEY, settings);
}

function stopMusic() {
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
  beat = 0; section = 0; variation = 1;
}

function toggleMusic() {
  if (musicInterval) { stopMusic(); playPauseBtn.textContent = '▶'; }
  else if (currentTrack) playTrack(currentTrack);
}

function sfx(type) {
  if (!audioCtx || isMuted) return;
  if (type === 'ok') [N.C5, N.E5, N.G5].forEach((f, i) => setTimeout(() => playNote(f, 'sine', 0.2, 0.08), i * 50));
  if (type === 'err') playNote(N.E3, 'sawtooth', 0.2, 0.1);
  if (type === 'type') playNote(N.A5, 'square', 0.03, 0.03);
  if (type === 'boot') playNote(N.C4, 'triangle', 0.1, 0.05);
}

muteBtn.addEventListener('click', () => { isMuted = !isMuted; muteBtn.textContent = isMuted ? '🔇' : '🔊'; });
playPauseBtn.addEventListener('click', toggleMusic);

document.getElementById('prevTrack').addEventListener('click', () => {
  const keys = Object.keys(MUSIC_TRACKS);
  const idx = keys.indexOf(currentTrack);
  playTrack(keys[(idx - 1 + keys.length) % keys.length]);
});

document.getElementById('nextTrack').addEventListener('click', () => {
  const keys = Object.keys(MUSIC_TRACKS);
  const idx = keys.indexOf(currentTrack);
  playTrack(keys[(idx + 1) % keys.length]);
});

// ============================================================
// SNAKE GAME
// ============================================================
const SW = 28, SH = 12;
let snakeBody, snakeDir, snakeFood, snakeScore, snakeOutputNode;

function spawnFood() {
  while (true) {
    const f = { x: Math.floor(Math.random() * SW), y: Math.floor(Math.random() * SH) };
    if (!snakeBody.some(s => s.x === f.x && s.y === f.y)) return f;
  }
}

function drawSnake() {
  let s = `Score: ${snakeScore}   [Arrow keys | Q = выйти]\n`;
  s += '+' + '─'.repeat(SW) + '+\n';
  for (let y = 0; y < SH; y++) {
    s += '│';
    for (let x = 0; x < SW; x++) {
      if (snakeBody[0].x === x && snakeBody[0].y === y) s += '@';
      else if (snakeBody.slice(1).some(b => b.x === x && b.y === y)) s += 'o';
      else if (snakeFood.x === x && snakeFood.y === y) s += '●';
      else s += ' ';
    }
    s += '│\n';
  }
  s += '+' + '─'.repeat(SW) + '+';
  if (snakeOutputNode) snakeOutputNode.textContent = s;
}

function startSnake() {
  snakeBody = [{ x: 7, y: 6 }];
  snakeDir = { x: 1, y: 0 };
  snakeScore = 0;
  snakeFood = spawnFood();
  snakeActive = true;
  inputEl.disabled = true;
  snakeCtrl.style.display = 'block';

  br();
  snakeOutputNode = document.createElement('pre');
  snakeOutputNode.style.cssText = 'font-family:inherit;font-size:12px;line-height:1.2;margin:4px 0;';
  outputEl.appendChild(snakeOutputNode);
  drawSnake();

  snakeTimer = setInterval(() => {
    const head = { x: snakeBody[0].x + snakeDir.x, y: snakeBody[0].y + snakeDir.y };
    if (head.x < 0 || head.x >= SW || head.y < 0 || head.y >= SH || snakeBody.some(b => b.x === head.x && b.y === head.y)) {
      endSnake(false); return;
    }
    snakeBody.unshift(head);
    if (head.x === snakeFood.x && head.y === snakeFood.y) { snakeScore += 10; snakeFood = spawnFood(); }
    else snakeBody.pop();
    drawSnake();
    outputEl.scrollTop = outputEl.scrollHeight;
  }, 160);
}

function endSnake(quit) {
  if (snakeTimer) { clearInterval(snakeTimer); snakeTimer = null; }
  snakeActive = false;
  snakeCtrl.style.display = 'none';
  inputEl.disabled = false;
  inputEl.focus();
  br();
  print(quit ? `Выход. Счёт: ${snakeScore}` : `GAME OVER! Счёт: ${snakeScore}`, quit ? 'info' : 'err');
}

widget.querySelectorAll('.tq-snake-btn').forEach(b => {
  b.addEventListener('click', () => {
    const map = { up: { x: 0, y: -1 }, down: { x: 0, y: 1 }, left: { x: -1, y: 0 }, right: { x: 1, y: 0 } };
    const d = map[b.dataset.d];
    if (d && !(snakeDir.x === -d.x && snakeDir.y === -d.y)) snakeDir = d;
  });
});

document.getElementById('snakeQuit').addEventListener('click', () => { if (snakeActive) endSnake(true); });

// ============================================================
// FILE SYSTEM
// ============================================================
function resolvePath(arg) {
  if (!arg) return currentPath;
  if (arg.startsWith('/')) return arg.replace(/\/$/, '') || '/';
  const parts = currentPath === '/' ? [] : currentPath.split('/').filter(Boolean);
  arg.split('/').forEach(p => {
    if (p === '..') { if (parts.length) parts.pop(); }
    else if (p !== '.') parts.push(p);
  });
  return '/' + parts.join('/') || '/';
}

// ============================================================
// COMMAND PROCESSOR
// ============================================================
async function process(raw) {
  const cmd = raw.trim();
  if (!cmd && !isEditMode) return;

  if (isEditMode) { handleEdit(cmd); return; }

  br();
  line(`<span style="color:#3fb950;font-weight:700;">${esc(promptEl.textContent)}</span> <span style="color:#79c0ff;">${esc(cmd)}</span>`);

  cmdHistory.unshift(cmd); histIdx = -1;

  const parts = cmd.split(/\s+/);
  const c = parts[0], a1 = parts[1], a2 = parts[2];

  if (snakeActive) {
    if (c === 'q') endSnake(true);
    else print("Игра активна. Q = выйти.", 'warn');
    return;
  }

  switch (c) {
    case 'pwd': print(currentPath); break;

    case 'ls': {
      const showHidden = a1 === '-a' || a1 === '-la';
      const target = showHidden ? currentPath : (a1 && a1[0] !== '-' ? resolvePath(a1) : currentPath);
      const node = FS[target];
      if (!node || node.type !== 'dir') { print(`ls: нет такой директории: ${target}`, 'err'); sfx('err'); break; }
      let items = node.children;
      if (!showHidden) items = items.filter(f => !f.startsWith('.'));
      if (!items.length) { print('(пусто)', 'dim'); break; }
      const out = items.map(f => {
        const fp = target === '/' ? `/${f}` : `${target}/${f}`;
        const isDir = FS[fp]?.type === 'dir';
        return isDir ? `<span style="color:${C.folder};font-weight:700;">${f}/</span>` : `<span style="color:${C.file};">${f}</span>`;
      }).join('  ');
      line(out); break;
    }

    case 'cd': {
      if (!a1) { currentPath = '/user'; updatePrompt(); break; }
      const np = resolvePath(a1);
      if (FS[np]?.type === 'dir') { currentPath = np; updatePrompt(); }
      else { print(`cd: не найдено: ${a1}`, 'err'); sfx('err'); }
      break;
    }

    case 'cat': {
      if (!a1) { print('cat: нужно имя файла', 'warn'); break; }
      const fp = resolvePath(a1);
      if (FS[fp]?.type === 'file') print(FS[fp].content);
      else { print(`cat: ${a1}: не найдено`, 'err'); sfx('err'); }
      break;
    }

    case 'touch': {
      if (!a1) break;
      const fp = resolvePath(a1);
      if (!FS[fp]) { FS[fp] = { type: 'file', content: '' }; FS[currentPath].children.push(a1); safeSave(FS_KEY, FS); print(`Создан файл: ${a1}`, 'ok'); }
      else print('Файл уже существует.', 'warn');
      break;
    }

    case 'mkdir': {
      if (!a1) break;
      const mp = resolvePath(a1);
      if (!FS[mp]) { FS[mp] = { type: 'dir', children: [] }; FS[currentPath].children.push(a1); safeSave(FS_KEY, FS); print(`Создана папка: ${a1}`, 'ok'); }
      else print('Уже существует.', 'warn');
      break;
    }

    case 'rm': {
      if (!a1) break;
      const rp = resolvePath(a1);
      if (FS[rp]) { delete FS[rp]; FS[currentPath].children = FS[currentPath].children.filter(f => f !== a1); safeSave(FS_KEY, FS); print(`Удалено: ${a1}`, 'ok'); }
      else { print(`rm: ${a1}: не найдено`, 'err'); sfx('err'); }
      break;
    }

    case 'mv': {
      if (!a1 || !parts[2]) { print('mv: mv <src> <dst>', 'warn'); break; }
      const sp = resolvePath(a1);
      if (!FS[sp]) { print(`mv: ${a1}: не найдено`, 'err'); sfx('err'); break; }
      let dp = resolvePath(parts[2]);
      if (FS[dp]?.type === 'dir') dp = (dp === '/' ? '' : dp) + '/' + a1;
      FS[dp] = FS[sp]; delete FS[sp];
      FS[currentPath].children = FS[currentPath].children.filter(f => f !== a1);
      safeSave(FS_KEY, FS);
      print(`Перемещено: ${a1} → ${parts[2]}`, 'ok'); break;
    }

    case 'cp': {
      if (!a1 || !parts[2]) { print('cp: cp <src> <dst>', 'warn'); break; }
      const sp = resolvePath(a1);
      if (!FS[sp]) { print(`cp: ${a1}: не найдено`, 'err'); sfx('err'); break; }
      let dp = resolvePath(parts[2]);
      if (FS[dp]?.type === 'dir') dp = (dp === '/' ? '' : dp) + '/' + a1;
      FS[dp] = JSON.parse(JSON.stringify(FS[sp]));
      const dname = dp.split('/').pop();
      const ddir = dp.substring(0, dp.lastIndexOf('/')) || '/';
      if (FS[ddir] && !FS[ddir].children.includes(dname)) FS[ddir].children.push(dname);
      safeSave(FS_KEY, FS);
      print(`Скопировано: ${a1} → ${parts[2]}`, 'ok'); break;
    }

    case 'ping': print(`PING ${a1 || 'host'}: 56 bytes\n64 bytes: time=12ms`, 'info'); break;

    case 'ps': print('  PID  NAME\n  101  system\n  202  kernel\n  404  guard [!]', 'info'); break;

    case 'kill': {
      const pid = parseInt(a1);
      print(pid === 404 ? 'Process 404 (guard) terminated.' : `kill: (${a1}) — terminated.`, 'ok'); break;
    }

    case 'chmod': print(`chmod: права изменены для ${a1 || 'файла'}`, 'ok'); break;

    case 'ssh': print(`SSH connecting to ${a1 || 'host'}...\nConnected.`, 'info'); break;

    case 'decrypt': print('Decrypting... root:password123', 'warn'); break;

    // ========== НОВЫЕ LINUX-КОМАНДЫ ==========
    case 'echo': {
      let out = parts.slice(1).join(' ');
      out = out.replace(/\\n/g, '\n').replace(/\\t/g, '\t');
      print(out); break;
    }

    case 'printf': {
      let out = parts.slice(1).join(' ');
      out = out.replace(/\\n/g, '\n').replace(/\\t/g, '\t').replace(/\\r/g, '\r');
      line(out); break;
    }

    case 'uname': {
      if (a1 === '-a') { print('TerminalQuest 5.15.0 x86_64 GNU/Linux'); }
      else if (a1 === '-r') { print('5.15.0'); }
      else if (a1 === '-m') { print('x86_64'); }
      else { print('TerminalQuest'); }
      break;
    }

    case 'whoami': print(userProfile.firstName.toLowerCase() || 'user'); break;

    case 'hostname': print('term-' + (userProfile.firstName || 'user').toLowerCase()); break;

    case 'date': print(new Date().toString()); break;

    case 'cal': {
      const now = new Date();
      const month = now.toLocaleString('ru', { month: 'long' });
      const year = now.getFullYear();
      print(`   ${month} ${year}`);
      print('Пн Вт Ср Чт Пт Сб Вс');
      const firstDay = new Date(year, now.getMonth(), 1);
      const lastDay = new Date(year, now.getMonth() + 1, 0);
      let line = '  '.repeat(firstDay.getDay()) + ' 1';
      for (let d = 2; d <= lastDay.getDate(); d++) {
        const dayOfWeek = new Date(year, now.getMonth(), d).getDay();
        line += (d < 10 ? '  ' : ' ') + d;
        if (dayOfWeek === 0 && d < lastDay.getDate()) { print(line); line = ''; }
      }
      print(line);
      break;
    }

    case 'uptime': {
      const hours = Math.floor(Math.random() * 24);
      const mins = Math.floor(Math.random() * 60);
      print(` ${new Date().toLocaleTimeString()} up ${hours}:${mins.toString().padStart(2, '0')}, 1 user, load average: 0.${Math.floor(Math.random()*99)}, 0.${Math.floor(Math.random()*99)}, 0.${Math.floor(Math.random()*99)}`);
      break;
    }

    case 'free': {
      const total = 8192;
      const used = Math.floor(Math.random() * 4000) + 1000;
      const free = total - used;
      print('              total        used        free      shared     buff/cache   available');
      print(`Mem:        ${total}        ${used}        ${free}          64         ${Math.floor(free/2)}        ${free}`);
      print(`Swap:       2048           0         2048`);
      break;
    }

    case 'df': {
      print('Файловая система     1K-блоков    Исполь    Доступно  Исполь%  Смонтировано в');
      print('/dev/sda1              52428800    12345678    40083122     24%  /');
      print('/dev/sdb1             104857600    45678901    59178699     44%  /home');
      print('tmpfs                   4096000      123456     3972544      4%  /tmp');
      break;
    }

    case 'du': {
      const target = a1 || '.';
      print(`${Math.floor(Math.random() * 1000)}\t${target}`);
      break;
    }

    case 'top': {
      print('top - ' + new Date().toLocaleTimeString() + ' up 1 day, 12:34, 1 user, load average: 0.52, 0.48, 0.44');
      print('Tasks: 142 total,   1 running, 141 sleeping,   0 stopped,   0 zombie');
      print('%Cpu(s):  12.5 us,  3.2 sy,  0.0 ni, 84.3 id,  0.0 wa,  0.0 hi,  0.0 si');
      print('MiB Mem :   8192.0 total,   2048.0 free,   4096.0 used,   2048.0 buff');
      br();
      print('  PID USER      PR  NI    VIRT    RES    SHR S  %CPU  %MEM     TIME+ COMMAND');
      print('  101 root      20   0   12345  8192   4096 S   5.0   0.1   0:12.34 systemd');
      print('  202 user      20   0   45678 16384   8192 R   3.2   0.2   1:23.45 bash');
      print('  404 guard     20   0   99999 32768  16384 S   1.0   0.4   5:67.89 guard');
      break;
    }

    case 'htop': {
      print('  1[                           ]  2[====                       ]');
      print('  3[====                       ]  4[====                       ]');

// ============================================================
document.addEventListener('keydown', e => {
  initAudio();
  
  if (snakeActive) {
    const map = { ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 }, ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 } };
    const d = map[e.key];
    if (d && !(snakeDir.x === -d.x && snakeDir.y === -d.y)) { snakeDir = d; e.preventDefault(); }
    if (e.key === 'q' || e.key === 'Escape') endSnake(true);
    return;
  }
  
  if (autocompleteVisible) {
    if (e.key === 'ArrowDown') { e.preventDefault(); navigateAutocomplete('down'); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); navigateAutocomplete('up'); return; }
    if (e.key === 'Tab' || e.key === 'Enter') { e.preventDefault(); if (autocompleteItems.length > 0) selectCurrentItem(); return; }
    if (e.key === 'Escape') { e.preventDefault(); hideAutocomplete(); return; }
    if (e.key === 'ArrowRight') { if (autocompleteItems.length > 0) { e.preventDefault(); selectCurrentItem(); } return; }
  }
  
  if (!autocompleteVisible) {
    if (e.key === 'ArrowUp') {
      if (histIdx < cmdHistory.length - 1) { histIdx++; inputEl.value = cmdHistory[histIdx] || ''; }
      e.preventDefault();
    }
    if (e.key === 'ArrowDown') {
      if (histIdx > 0) { histIdx--; inputEl.value = cmdHistory[histIdx] || ''; }
      else { histIdx = -1; inputEl.value = ''; }
      e.preventDefault();
    }
  }
});

inputEl.addEventListener('keydown', e => {
  initAudio();
  
  if (e.key === 'Enter' && !autocompleteVisible) {
    const val = inputEl.value;
    inputEl.value = '';
    lastInputValue = '';
    sfx('type');
    process(val);
    return;
  }
  
  if (e.key === 'Tab' && !autocompleteVisible) {
    e.preventDefault();
    const completions = getCompletions(inputEl.value);
    if (completions.length > 0) showAutocomplete(completions);
  }
});

inputEl.addEventListener('input', () => {
  const val = inputEl.value;
  if (val.includes(' ')) {
    if (val !== lastInputValue) {
      lastInputValue = val;
      const completions = getCompletions(val);
      if (completions.length > 0) showAutocomplete(completions);
      else hideAutocomplete();
    }
  } else {
    hideAutocomplete();
    lastInputValue = val;
  }
});

document.getElementById('terminal').addEventListener('click', () => { initAudio(); inputEl.focus(); });

// ============================================================
// BOOT
// ============================================================
async function boot() {
  applyTheme(settings.theme);
  updateUI();
  updatePrompt();
  inputEl.disabled = true;

  const bootLines = [
    ['[ BIOS ] Initializing...', 'dim'],
    ['[ SYS  ] Mounting filesystem...', 'dim'],
    ['[ OK   ] System ready.', 'ok'],
  ];

  for (const [txt, type] of bootLines) {
    await new Promise(r => setTimeout(r, 120));
    sfx('boot');
    print(txt, type);
  }

  br();
  if (userProfile.firstName !== 'User') {
    line(`<span style="color:#3fb950;font-weight:700;">Привет, ${esc(userProfile.firstName)}!</span>`);
  } else {
    print("Введите 'edit' для настройки профиля.", 'warn');
  }
  print("Введите 'help' для списка команд.", 'dim');
  print("TAB — автодополнение, ↑↓ — навигация, Enter — выбрать", 'dim');
  br();

  if (!isSandbox) {
    line(`<span style="color:#d29922">Задание: ${esc(LEVELS[currentLevel].text)}</span>`);
  }

  inputEl.disabled = false;
  inputEl.focus();
}

boot();

})();
</script>
